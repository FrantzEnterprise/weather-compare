<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌤️ 3-City Weather Compare</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .city-inputs {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .city-input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .city-input-group label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9b8ecb;
      font-weight: 600;
    }

    .city-input-group input {
      padding: 0.6rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      width: 155px;
      text-align: center;
      backdrop-filter: blur(4px);
      transition: border-color 0.2s;
    }

    .city-input-group input:focus {
      outline: none;
      border-color: #7c6bdb;
      background: rgba(255,255,255,0.12);
    }

    .city-input-group input::placeholder {
      color: #666;
    }

    .refresh-btn {
      padding: 0.65rem 1.8rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .refresh-btn:active {
      transform: translateY(0);
    }

    /* Toggle buttons */
    .toggle-bar {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .toggle-btn {
      padding: 0.4rem 1rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-color: transparent;
    }

    .toggle-btn:hover:not(.active) {
      background: rgba(255,255,255,0.1);
    }

    /* Weather Cards */
    .weather-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .weather-card {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 1.5rem 1.2rem;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .weather-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .weather-card .city-name {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    .weather-card .country {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.2rem;
    }

    .weather-card .temp {
      font-size: 3.2rem;
      font-weight: 300;
      line-height: 1.1;
    }

    .weather-card .temp sup {
      font-size: 1.4rem;
      top: -1rem;
    }

    .weather-card .hi-low {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    .weather-card .description {
      font-size: 0.95rem;
      color: #ccc;
      text-transform: capitalize;
      margin-bottom: 0.2rem;
    }

    .weather-card .feels-like {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.5rem;
    }

    .weather-card .sun-times {
      font-size: 0.8rem;
      color: #bbb;
      margin-bottom: 0.6rem;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
    }

    /* Detail grid */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem 0.8rem;
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      padding: 0.2rem 0.3rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
    }

    .detail-item .label {
      color: #888;
    }

    .detail-item .value {
      color: #ddd;
      font-weight: 500;
    }

    .weather-card .icon-wrap {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .last-updated {
      text-align: center;
      color: #666;
      font-size: 0.8rem;
      margin-top: 2rem;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .weather-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .city-inputs {
        flex-direction: column;
        align-items: stretch;
      }
      .city-input-group input {
        width: 100%;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .refresh-btn {
        width: 100%;
      }
    }

    @media (min-width: 801px) and (max-width: 1100px) {
      .weather-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌤️ Weather Compare</h1>
    <p class="subtitle">Compare detailed weather across 3 cities side by side</p>

    <div class="controls">
      <div class="city-inputs">
        <div class="city-input-group">
          <label>City 1</label>
          <input type="text" id="city1" value="London" placeholder="e.g. London" />
        </div>
        <div class="city-input-group">
          <label>City 2</label>
          <input type="text" id="city2" value="Tokyo" placeholder="e.g. Tokyo" />
        </div>
        <div class="city-input-group">
          <label>City 3</label>
          <input type="text" id="city3" value="New York" placeholder="e.g. New York" />
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
    </div>

    <div class="toggle-bar">
      <button class="toggle-btn active" id="unitF" data-unit="F">°F</button>
      <button class="toggle-btn" id="unitC" data-unit="C">°C</button>
    </div>

    <div class="weather-grid" id="weatherGrid">
      <!-- Cards rendered by JS -->
    </div>

    <p class="last-updated" id="lastUpdated"></p>
  </div>

  <script>
    const API_KEY = '3568cb531e6528ea194ba116817e4b54';
    const DEFAULT_CITIES = ['London', 'Tokyo', 'New York'];
    const CARD_COLORS = [
      'rgba(102, 126, 234, 0.12)',
      'rgba(118, 75, 162, 0.12)',
      'rgba(237, 100, 166, 0.12)'
    ];

    let currentUnit = 'F';

    // ─── helpers ────────────────────────────────────────

    function degToCompass(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function formatTime(ts, tzOffset) {
      const d = new Date((ts + tzOffset) * 1000);
      return d.toLocaleTimeString('en-US', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit' });
    }

    function convertTemp(tempF) {
      if (currentUnit === 'C') return Math.round((tempF - 32) * 5 / 9);
      return Math.round(tempF);
    }

    function tempUnit() {
      return currentUnit === 'C' ? '°C' : '°F';
    }

    function visibilityStr(meters) {
      if (meters >= 1000) return (meters / 1000).toFixed(1) + ' km';
      return meters + ' m';
    }

    // ─── API ────────────────────────────────────────────

    async function fetchWeather(city) {
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=imperial&appid=${API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) {
        if (res.status === 404) throw new Error(`City not found: "${city}"`);
        if (res.status === 401) throw new Error('Invalid API key');
        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      }
      return res.json();
    }

    async function fetchUVI(lat, lon) {
      try {
        const url = `https://api.openweathermap.org/data/2.5/uvi?lat=${lat}&lon=${lon}&appid=${API_KEY}`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        return data.value;
      } catch {
        return null;
      }
    }

    // ─── emoji ──────────────────────────────────────────

    function weatherEmoji(iconCode) {
      const map = {
        '01d': '☀️', '01n': '🌙',
        '02d': '⛅', '02n': '☁️',
        '03d': '☁️', '03n': '☁️',
        '04d': '☁️', '04n': '☁️',
        '09d': '🌧️', '09n': '🌧️',
        '10d': '🌦️', '10n': '🌧️',
        '11d': '⛈️', '11n': '⛈️',
        '13d': '❄️', '13n': '❄️',
        '50d': '🌫️', '50n': '🌫️'
      };
      return map[iconCode] || '🌡️';
    }

    function uviLevel(val) {
      if (val === null || val === undefined) return '—';
      if (val <= 2) return `${val} (Low)`;
      if (val <= 5) return `${val} (Moderate)`;
      if (val <= 7) return `${val} (High)`;
      if (val <= 10) return `${val} (Very High)`;
      return `${val} (Extreme)`;
    }

    // ─── card builders ──────────────────────────────────

    function buildCardHTML(data, index) {
      const icon = data.weather && data.weather[0];
      const emoji = icon ? weatherEmoji(icon.icon) : '🌡️';
      const bgColor = CARD_COLORS[index % CARD_COLORS.length];
      const tz = data.timezone || 0;

      const temp = convertTemp(data.main.temp);
      const feelsLike = convertTemp(data.main.feels_like);
      const tempMin = convertTemp(data.main.temp_min);
      const tempMax = convertTemp(data.main.temp_max);
      const unit = tempUnit();

      const windDeg = data.wind.deg;
      const windDir = windDeg !== undefined ? degToCompass(windDeg) : '—';

      const sunrise = data.sys && data.sys.sunrise ? formatTime(data.sys.sunrise, tz) : '—';
      const sunset  = data.sys && data.sys.sunset  ? formatTime(data.sys.sunset, tz) : '—';

      let uvi = '...';
      // Fetch UV async in background and update card later
      if (data.coord) {
        fetchUVI(data.coord.lat, data.coord.lon).then(val => {
          const el = document.getElementById(`uvi-${index}`);
          if (el) el.textContent = uviLevel(val);
        });
      }

      return `
        <div class="weather-card" style="background: ${bgColor};">
          <div class="icon-wrap">${emoji}</div>
          <div class="city-name">${data.name}</div>
          <div class="country">${data.sys ? data.sys.country : ''}</div>
          <div class="temp">${temp}<sup>${unit}</sup></div>
          <div class="hi-low">H: ${tempMax}${unit} &nbsp; L: ${tempMin}${unit}</div>
          <div class="description">${icon ? icon.description : ''}</div>
          <div class="feels-like">Feels like ${feelsLike}${unit}</div>
          <div class="sun-times">
            <span>🌅 ${sunrise}</span>
            <span>🌇 ${sunset}</span>
          </div>
          <div class="detail-grid">
            <div class="detail-item"><span class="label">💧 Humidity</span><span class="value">${data.main.humidity}%</span></div>
            <div class="detail-item"><span class="label">💨 Wind</span><span class="value">${Math.round(data.wind.speed)} mph ${windDir}</span></div>
            <div class="detail-item"><span class="label">📊 Pressure</span><span class="value">${Math.round(data.main.pressure)} hPa</span></div>
            <div class="detail-item"><span class="label">☁️ Clouds</span><span class="value">${data.clouds ? data.clouds.all : '—'}%</span></div>
            <div class="detail-item"><span class="label">👁️ Visibility</span><span class="value">${data.visibility !== undefined ? visibilityStr(data.visibility) : '—'}</span></div>
            <div class="detail-item"><span class="label">🌞 UV Index</span><span class="value" id="uvi-${index}">...</span></div>
          </div>
        </div>
      `;
    }

    function buildErrorCard(city, errorMsg) {
      return `
        <div class="weather-card" style="background: rgba(255, 107, 107, 0.1);">
          <div style="font-size: 3rem; margin-bottom: 0.5rem;">⚠️</div>
          <div class="city-name">${city}</div>
          <div class="error-msg">${errorMsg}</div>
        </div>
      `;
    }

    function buildLoadingCard() {
      return `
        <div class="weather-card" style="min-height: 350px; justify-content: center; align-items: center;">
          <div class="spinner"></div>
          <div style="color: #888; margin-top: 1rem;">Loading...</div>
        </div>
      `;
    }

    // ─── main update ────────────────────────────────────

    async function updateWeather() {
      const grid = document.getElementById('weatherGrid');
      const city1 = document.getElementById('city1').value.trim() || DEFAULT_CITIES[0];
      const city2 = document.getElementById('city2').value.trim() || DEFAULT_CITIES[1];
      const city3 = document.getElementById('city3').value.trim() || DEFAULT_CITIES[2];
      const cities = [city1, city2, city3];

      grid.innerHTML = cities.map(() => buildLoadingCard()).join('');

      try {
        const results = await Promise.allSettled(
          cities.map(city => fetchWeather(city))
        );

        const html = results.map((result, idx) => {
          if (result.status === 'fulfilled') {
            return buildCardHTML(result.value, idx);
          } else {
            return buildErrorCard(cities[idx], result.reason.message);
          }
        }).join('');

        grid.innerHTML = html;

        const now = new Date();
        document.getElementById('lastUpdated').textContent =
          `Last updated: ${now.toLocaleTimeString()} on ${now.toLocaleDateString()}`;
      } catch (err) {
        grid.innerHTML = cities.map(() =>
          buildErrorCard('Error', err.message)
        ).join('');
      }
    }

    // ─── unit toggle ────────────────────────────────────

    function setUnit(unit) {
      currentUnit = unit;
      document.getElementById('unitF').classList.toggle('active', unit === 'F');
      document.getElementById('unitC').classList.toggle('active', unit === 'C');
      // Re-render with same data if any cards exist
      const grid = document.getElementById('weatherGrid');
      const firstCard = grid.querySelector('.weather-card');
      if (firstCard && !firstCard.querySelector('.spinner')) {
        updateWeather();
      }
    }

    document.getElementById('unitF').addEventListener('click', () => setUnit('F'));
    document.getElementById('unitC').addEventListener('click', () => setUnit('C'));

    // ─── init ───────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', updateWeather);
    document.getElementById('refreshBtn').addEventListener('click', updateWeather);
    document.querySelectorAll('.city-inputs input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') updateWeather();
      });
    });
  </script>
</body>
</html>
